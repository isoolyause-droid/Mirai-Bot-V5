app = "mirai-bot-v3"
primary_region = "sin"

[build]
  [build.args]
    NODE_VERSION = "20"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  # Set APPSTATE secret via: fly secrets set APPSTATE="<contents of appstate.json>"

[http_service]
  internal_port = 5000
  force_https   = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "60s"
    method       = "GET"
    path         = "/health"
    timeout      = "10s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
