services:
  - type: worker
    name: mirai-bot-v3
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: APPSTATE
        sync: false   # Set in Render dashboard → Environment → paste appstate.json contents
      - key: FB_COOKIE
        sync: false   # Optional fallback: paste cookie string if no appstate
